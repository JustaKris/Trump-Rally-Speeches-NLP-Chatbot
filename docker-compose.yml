version: '3.8'

services:
  # Redis for response caching (optional but recommended for production)
  redis:
    image: redis:7-alpine
    container_name: trump-speeches-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trump-speeches-nlp-chatbot
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      # Redis cache configuration
      - CACHE_ENABLED=true
      - CACHE_REDIS_HOST=redis
      - CACHE_REDIS_PORT=6379
      - CACHE_TTL_SECONDS=3600
    env_file:
      - .env
    volumes:
      # Mount data directory for development (optional)
      - ./data:/app/data:ro
      # Persist HuggingFace model cache for faster restarts
      - huggingface-cache:/home/appuser/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# For development with hot reload
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trump-speeches-nlp-chatbot-dev
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      # Redis cache configuration
      - CACHE_ENABLED=true
      - CACHE_REDIS_HOST=redis
      - CACHE_REDIS_PORT=6379
      - CACHE_TTL_SECONDS=3600
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data:ro
      - huggingface-cache:/home/appuser/.cache/huggingface
    command: uvicorn speech_nlp.app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev

# Named volumes for persistent storage
volumes:
  huggingface-cache:
    name: trump-speeches-huggingface-cache
  redis-data:
    name: trump-speeches-redis-data
