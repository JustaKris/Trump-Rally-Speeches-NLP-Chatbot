name: "Lint: Markdown"

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
    paths:
      - "docs/**/*.md"
      - "*.md"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    continue-on-error: true  # Documentation issues shouldn't block deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run markdown linting
        run: |
          echo "Running markdown linting on documentation..."
          uvx pymarkdownlnt --config pyproject.toml scan docs/ README.md

      - name: Summary
        if: success()
        run: echo "✅ All markdown files are well-formatted!"

      - name: Failure summary
        if: failure()
        run: |
          echo "⚠️  Markdown formatting issues found. Please review the output above."
          echo "📖 See docs/development/markdown-linting.md for guidance."
